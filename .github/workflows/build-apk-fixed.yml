name: Build debug APK - auto find ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Repository root:"
          pwd
          echo ""
          echo "Root files:"
          ls -la
          echo ""
          echo "All ZIP files:"
          find . -maxdepth 4 -type f -iname "*.zip" -print || true
          echo ""
          echo "Workflow files:"
          find .github -maxdepth 5 -type f -print || true

      - name: Find Android project ZIP automatically
        id: find_zip
        run: |
          set -e

          ZIP_FILE=""

          if [ -f "android-project.zip" ]; then
            ZIP_FILE="android-project.zip"
          else
            ZIP_FILE="$(find . -maxdepth 3 -type f -iname "*.zip" \
              ! -path "./.git/*" \
              ! -path "./.github/*" \
              | sort \
              | head -n 1 || true)"
          fi

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No ZIP file found."
            echo ""
            echo "Upload your Android project ZIP to the repository root."
            echo "Recommended name: android-project.zip"
            echo ""
            echo "Current repository files:"
            find . -maxdepth 4 -type f -print
            exit 1
          fi

          echo "Using ZIP file: $ZIP_FILE"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Unzip Android project archive
        run: |
          set -e
          rm -rf extracted-project
          mkdir -p extracted-project
          unzip -q "${{ steps.find_zip.outputs.zip_file }}" -d extracted-project
          echo "Extracted tree:"
          find extracted-project -maxdepth 4 -type f | head -200

      - name: Detect Android project root
        id: detect
        run: |
          set -e

          PROJECT_DIR=""

          if [ -f "extracted-project/settings.gradle" ] || [ -f "extracted-project/settings.gradle.kts" ]; then
            PROJECT_DIR="extracted-project"
          else
            SETTINGS_FILE="$(find extracted-project -maxdepth 6 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -print | head -n 1 || true)"
            if [ -n "$SETTINGS_FILE" ]; then
              PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
            fi
          fi

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Cannot find settings.gradle or settings.gradle.kts."
            echo ""
            echo "This means the ZIP is not an Android Gradle project ZIP, or it contains another ZIP inside it."
            echo ""
            echo "Extracted files:"
            find extracted-project -maxdepth 8 -type f | head -300
            exit 1
          fi

          echo "Detected project dir: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable if present
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          fi

      - name: Print Gradle project info
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          echo "Project directory:"
          pwd
          echo ""
          echo "Files:"
          ls -la
          echo ""
          if [ -f "./gradlew" ]; then
            ./gradlew projects --stacktrace
          else
            gradle projects --stacktrace
          fi

      - name: Build debug APK
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew clean assembleDebug --stacktrace --warning-mode all
          else
            gradle clean assembleDebug --stacktrace --warning-mode all
          fi

      - name: Collect APK files
        run: |
          set -e
          rm -rf apk-output
          mkdir -p apk-output
          find "${{ steps.detect.outputs.project_dir }}" -type f -name "*.apk" -exec cp {} apk-output/ \;
          echo "Collected APK files:"
          ls -la apk-output

          APK_COUNT="$(find apk-output -type f -name "*.apk" | wc -l)"
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: Build finished but no APK files were found."
            find "${{ steps.detect.outputs.project_dir }}" -maxdepth 8 -type f | grep -i "apk\|aab" || true
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: A12-Recovery-Pro-Debug-APK
          path: apk-output/*.apk
          if-no-files-found: error
