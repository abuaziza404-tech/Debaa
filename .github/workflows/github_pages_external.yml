name: FalconEye Static Integrity + GitHub Pages Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: falconeye-pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate FalconEye static package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect site directory
        id: site
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "public" ]; then
            echo "dir=public" >> "$GITHUB_OUTPUT"
          elif [ -d "docs" ]; then
            echo "dir=docs" >> "$GITHUB_OUTPUT"
          else
            echo "No public/ or docs/ directory found."
            exit 1
          fi

      - name: Verify required files
        shell: bash
        run: |
          set -euo pipefail
          SITE_DIR="${{ steps.site.outputs.dir }}"

          test -f "$SITE_DIR/index.html"

          if [ -d "$SITE_DIR/assets" ]; then
            test -f "$SITE_DIR/assets/gold_candidates.geojson"
            test -f "$SITE_DIR/assets/gold_model_config.json"
          fi

          if grep -R "YOUR_API_KEY\|OPENAI_API_KEY=.*sk-\|TODO\|FIXME" "$SITE_DIR" 2>/dev/null; then
            echo "Unsafe placeholder, API key, TODO, or FIXME found."
            exit 1
          fi

      - name: Validate GeoJSON and JSON assets
        shell: bash
        run: |
          set -euo pipefail
          SITE_DIR="${{ steps.site.outputs.dir }}"

          python3 - <<'PY'
          import json
          from pathlib import Path
          import sys

          site = Path("${{ steps.site.outputs.dir }}")
          assets = site / "assets"

          if assets.exists():
              geojson_path = assets / "gold_candidates.geojson"
              config_path = assets / "gold_model_config.json"

              if geojson_path.exists():
                  data = json.loads(geojson_path.read_text(encoding="utf-8"))
                  if data.get("type") != "FeatureCollection":
                      raise SystemExit("gold_candidates.geojson must be a FeatureCollection")
                  for index, feature in enumerate(data.get("features", []), start=1):
                      if feature.get("type") != "Feature":
                          raise SystemExit(f"Feature #{index} is not a valid GeoJSON Feature")
                      geometry = feature.get("geometry") or {}
                      if geometry.get("type") != "Point":
                          raise SystemExit(f"Feature #{index} geometry must be Point")
                      coords = geometry.get("coordinates") or []
                      if len(coords) < 2:
                          raise SystemExit(f"Feature #{index} coordinates are incomplete")
                      lon, lat = float(coords[0]), float(coords[1])
                      if not (-180 <= lon <= 180 and -90 <= lat <= 90):
                          raise SystemExit(f"Feature #{index} coordinates are out of range")

              if config_path.exists():
                  config = json.loads(config_path.read_text(encoding="utf-8"))
                  weights = config.get("weights", {})
                  if not isinstance(weights, dict) or not weights:
                      raise SystemExit("gold_model_config.json must include non-empty weights")
                  total = sum(float(value) for value in weights.values())
                  if total <= 0:
                      raise SystemExit("gold_model_config weights must sum to a positive value")

          html = (site / "index.html").read_text(encoding="utf-8", errors="ignore")
          required_markers = ["GoldScore", "Leaflet", "Esri"]
          missing = [marker for marker in required_markers if marker.lower() not in html.lower()]
          if missing:
              print("Warning: optional UI markers missing:", ", ".join(missing))

          print("FalconEye static validation passed.")
          PY

      - name: Upload validated static artifact
        uses: actions/upload-artifact@v4
        with:
          name: falconeye-static-site
          path: ${{ steps.site.outputs.dir }}
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect site directory
        id: site
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "public" ]; then
            echo "dir=public" >> "$GITHUB_OUTPUT"
          elif [ -d "docs" ]; then
            echo "dir=docs" >> "$GITHUB_OUTPUT"
          else
            echo "No public/ or docs/ directory found."
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.site.outputs.dir }}

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
