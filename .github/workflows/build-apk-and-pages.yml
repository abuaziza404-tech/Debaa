name: Build APK and Deploy HTML

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: alpine-radar-gps
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Repository root:"
          pwd
          echo "Files:"
          find . -maxdepth 3 -type f | sort | head -200

      - name: Extract package if only ZIP was uploaded
        shell: bash
        run: |
          set -e
          if [ ! -d "android" ]; then
            ZIP_FILE="$(find . -maxdepth 2 -type f -name '*.zip' | head -1 || true)"
            if [ -n "$ZIP_FILE" ]; then
              echo "Found ZIP package: $ZIP_FILE"
              mkdir -p _extracted
              unzip -q "$ZIP_FILE" -d _extracted
            else
              echo "No ZIP package found."
            fi
          fi

      - name: Locate Android project
        id: locate_android
        shell: bash
        run: |
          set -e

          SETTINGS_FILE="$(find . -maxdepth 6 -type f -path '*/android/settings.gradle' | head -1 || true)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "::error::لم يتم العثور على android/settings.gradle. يجب رفع محتويات الحزمة إلى جذر المستودع أو رفع ملف ZIP كامل داخل المستودع."
            echo "Current files:"
            find . -maxdepth 5 -type f | sort | head -300
            exit 1
          fi

          ANDROID_DIR="$(dirname "$SETTINGS_FILE")"
          echo "ANDROID_DIR=$ANDROID_DIR" >> "$GITHUB_ENV"
          echo "Android project found at: $ANDROID_DIR"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        shell: bash
        run: |
          set -e
          gradle -p "$ANDROID_DIR" :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-direct-gps-debug-apk
          path: ${{ env.ANDROID_DIR }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  deploy-html:
    name: Deploy HTML PWA to GitHub Pages
    needs: build-apk
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract package if only ZIP was uploaded
        shell: bash
        run: |
          set -e
          if [ ! -d "html" ]; then
            ZIP_FILE="$(find . -maxdepth 2 -type f -name '*.zip' | head -1 || true)"
            if [ -n "$ZIP_FILE" ]; then
              mkdir -p _extracted
              unzip -q "$ZIP_FILE" -d _extracted
            fi
          fi

      - name: Locate HTML app
        shell: bash
        run: |
          set -e

          HTML_INDEX="$(find . -maxdepth 6 -type f -path '*/html/index.html' | head -1 || true)"

          if [ -z "$HTML_INDEX" ]; then
            echo "::error::لم يتم العثور على html/index.html. يجب رفع مجلد html أو رفع ملف ZIP كامل."
            find . -maxdepth 5 -type f | sort | head -300
            exit 1
          fi

          HTML_DIR="$(dirname "$HTML_INDEX")"
          echo "HTML_DIR=$HTML_DIR" >> "$GITHUB_ENV"
          echo "HTML app found at: $HTML_DIR"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload HTML artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.HTML_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
