name: BOUH V68 One Upload APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    name: إنشاء مشروع وبناء ملف APK
    runs-on: ubuntu-latest

    steps:
      - name: Create BOUH V68 Android project
        run: |
          set -euo pipefail
          mkdir -p app/src/main/java/com/bouh/v68
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets/bouh

          cat > settings.gradle.kts <<'KTS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "BOUH_V68_ONE_UPLOAD_ANDROID_PRO"
          include(":app")
          KTS

          cat > build.gradle.kts <<'KTS'
          plugins {
              id("com.android.application") version "8.7.3" apply false
          }
          KTS

          cat > app/build.gradle.kts <<'KTS'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "com.bouh.v68"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.bouh.v68"
                  minSdk = 23
                  targetSdk = 35
                  versionCode = 68
                  versionName = "68.0-one-upload-pro"
              }
          }
          KTS

          cat > app/src/main/res/values/styles.xml <<'XML'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:statusBarColor">#071018</item>
                  <item name="android:navigationBarColor">#071018</item>
              </style>
          </resources>
          XML

          cat > app/src/main/AndroidManifest.xml <<'XML'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />

              <application
                  android:theme="@style/AppTheme"
                  android:label="BOUH V68 Pro"
                  android:allowBackup="true"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          cat > app/src/main/assets/bouh/bouh_rules.json <<'JSON'
          {
            "system": "BOUH GOLD DEEP DETECTOR V68 PRO LIGHT",
            "decision_rule": "Structure -> Pattern -> Alteration -> Confirmation -> Decision",
            "truth_rule": "No raw GeoTIFF/DEM/CSV means no numeric spectral claim",
            "reject_rule": "No Structure + No Clay/Silica = Reject Target",
            "gpz_7000": {
              "high_magnetic_ground": "Ground Type Severe/Difficult, Gold Mode High Yield, Sensitivity 8-11, Audio Smoothing Low/On, slow swing",
              "low_magnetic_high_quartz": "Ground Type Normal, Gold Mode General/Deep, Sensitivity 12-16, Audio Smoothing Off"
            }
          }
          JSON

          cat > app/src/main/java/com/bouh/v68/MainActivity.java <<'JAVA'
          package com.bouh.v68;

          import android.Manifest;
          import android.app.Activity;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.location.Location;
          import android.location.LocationListener;
          import android.location.LocationManager;
          import android.os.Bundle;
          import android.text.InputType;
          import android.view.Gravity;
          import android.widget.*;
          import java.text.SimpleDateFormat;
          import java.util.*;

          public class MainActivity extends Activity {
              private LinearLayout root;
              private TextView output;
              private SharedPreferences prefs;
              private double lastLat = 0, lastLon = 0;

              @Override public void onCreate(Bundle b) {
                  super.onCreate(b);
                  prefs = getSharedPreferences("BOUH_V68", MODE_PRIVATE);
                  showHome();
              }

              private void base(String title) {
                  root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(22, 22, 22, 22);
                  root.setBackgroundColor(Color.rgb(7,16,24));

                  ScrollView scroll = new ScrollView(this);
                  scroll.addView(root);
                  setContentView(scroll);

                  TextView header = new TextView(this);
                  header.setText(title);
                  header.setTextColor(Color.rgb(255,207,92));
                  header.setTextSize(22);
                  header.setGravity(Gravity.CENTER);
                  header.setPadding(0, 0, 0, 20);
                  root.addView(header);

                  output = new TextView(this);
                  output.setTextColor(Color.WHITE);
                  output.setTextSize(15);
                  output.setPadding(12, 12, 12, 12);
              }

              private Button btn(String text) {
                  Button b = new Button(this);
                  b.setText(text);
                  b.setAllCaps(false);
                  root.addView(b, new LinearLayout.LayoutParams(-1, -2));
                  return b;
              }

              private EditText input(String hint) {
                  EditText e = new EditText(this);
                  e.setHint(hint);
                  e.setTextColor(Color.WHITE);
                  e.setHintTextColor(Color.LTGRAY);
                  e.setSingleLine(false);
                  e.setInputType(InputType.TYPE_CLASS_TEXT | InputType.TYPE_TEXT_FLAG_MULTI_LINE);
                  root.addView(e, new LinearLayout.LayoutParams(-1, -2));
                  return e;
              }

              private void card(String text) {
                  output.setText(text);
                  if (output.getParent() == null) root.addView(output);
              }

              private void back() {
                  btn("رجوع").setOnClickListener(v -> showHome());
              }

              private void showHome() {
                  base("BOUH V68 Android Pro");
                  TextView sub = new TextView(this);
                  sub.setText("GPS، BOUH Target Engine، GPZ Strategy، AI محلي، طبيب فرز، شاعر، وسجل.");
                  sub.setTextColor(Color.LTGRAY);
                  sub.setPadding(0, 0, 0, 18);
                  root.addView(sub);

                  btn("1) GPS / GNSS").setOnClickListener(v -> showGps());
                  btn("2) BOUH Gold Target Engine").setOnClickListener(v -> showGold());
                  btn("3) GPZ 7000 Field Strategy").setOnClickListener(v -> showGpz());
                  btn("4) AI عربي محلي").setOnClickListener(v -> showAi());
                  btn("5) طبيب فرز ميداني").setOnClickListener(v -> showHealth());
                  btn("6) شاعر نبطي").setOnClickListener(v -> showPoet());
                  btn("7) السجل").setOnClickListener(v -> showLogs());
                  btn("8) تصدير تقرير").setOnClickListener(v -> card(exportReport()));
              }

              private void showGps() {
                  base("GPS / GNSS");
                  back();
                  btn("تحديث موقعي").setOnClickListener(v -> updateGps());
                  card("اضغط تحديث موقعي واسمح بصلاحية الموقع.");
              }

              private void updateGps() {
                  if (checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.ACCESS_FINE_LOCATION, Manifest.permission.ACCESS_COARSE_LOCATION}, 7);
                      card("تم طلب صلاحية الموقع. اضغط الزر مرة أخرى بعد السماح.");
                      return;
                  }

                  try {
                      LocationManager lm = (LocationManager)getSystemService(Context.LOCATION_SERVICE);
                      Location loc = lm.getLastKnownLocation(LocationManager.GPS_PROVIDER);
                      if (loc == null) loc = lm.getLastKnownLocation(LocationManager.NETWORK_PROVIDER);
                      if (loc != null) saveLocation(loc);

                      lm.requestLocationUpdates(LocationManager.GPS_PROVIDER, 2000, 1, new LocationListener() {
                          @Override public void onLocationChanged(Location location) { saveLocation(location); }
                          @Override public void onStatusChanged(String provider, int status, Bundle extras) {}
                          @Override public void onProviderEnabled(String provider) {}
                          @Override public void onProviderDisabled(String provider) {}
                      });
                  } catch(Exception e) {
                      card("خطأ GPS: " + e.getMessage());
                  }
              }

              private void saveLocation(Location loc) {
                  lastLat = loc.getLatitude();
                  lastLon = loc.getLongitude();
                  prefs.edit().putString("last_gps", lastLat + "," + lastLon).apply();
                  addLog("GPS", "Lat=" + lastLat + " Lon=" + lastLon);
                  card("Lat: " + fmt(lastLat, 6) + "\nLon: " + fmt(lastLon, 6) + "\nAccuracy: " + loc.getAccuracy() + " m");
              }

              private void showGold() {
                  base("BOUH Gold Target Engine");
                  back();

                  EditText structure = input("Structure 0-100");
                  EditText clay = input("Clay/Silica/Quartz 0-100");
                  EditText pattern = input("Pattern/Drainage/Regolith 0-100");
                  EditText feox = input("FeOx/Gossan 0-100");
                  EditText field = input("Field Evidence/GPZ 0-100");

                  btn("تحليل الهدف").setOnClickListener(v -> {
                      double s = num(structure);
                      double a = num(clay);
                      double p = num(pattern);
                      double f = num(feox);
                      double e = num(field);

                      double score = 0.32*s + 0.28*a + 0.18*p + 0.10*f + 0.12*e;
                      String decision;

                      if (s < 35 || a < 25) decision = "REJECT: لا Structure كافي أو لا Clay/Silica كافي";
                      else if (score >= 78) decision = "Class A: أولوية عالية";
                      else if (score >= 60) decision = "Class B: فحص GPZ وعينة";
                      else if (score >= 45) decision = "Class C: استطلاع فقط";
                      else decision = "REJECT/LOW";

                      String r = "BOUH Score: " + fmt(score,1) + "/100\nDecision: " + decision +
                              "\n\nهذه درجة إدخال يدوي وليست حسابًا طيفيًا من GeoTIFF.";
                      addLog("TARGET", r);
                      card(r);
                  });
              }

              private void showGpz() {
                  base("GPZ 7000 Field Strategy");
                  back();

                  EditText magnetic = input("Magnetic Ground Risk 0-100");
                  EditText quartz = input("Quartz/Silica Evidence 0-100");

                  btn("إعداد GPZ").setOnClickListener(v -> {
                      double m = num(magnetic);
                      double q = num(quartz);
                      String r;

                      if (m >= 75) {
                          r = "Ground Type: Severe/Difficult\nGold Mode: High Yield\nSensitivity: 8-11\nAudio Smoothing: Low/On\nSwing: بطيء جدًا";
                      } else if (m < 45 && q >= 65) {
                          r = "Ground Type: Normal\nGold Mode: General/Deep\nSensitivity: 12-16\nAudio Smoothing: Off";
                      } else {
                          r = "Ground Type: Difficult\nGold Mode: High Yield أو General\nSensitivity: 10-13";
                      }

                      addLog("GPZ", r);
                      card(r);
                  });
              }

              private void showAi() {
                  base("AI عربي محلي خفيف");
                  back();

                  EditText q = input("اسأل المساعد");
                  EditText trainQ = input("سؤال تدريبي");
                  EditText trainA = input("إجابة تدريبية");

                  btn("إجابة").setOnClickListener(v -> card(localAi(q.getText().toString())));

                  btn("تدريب").setOnClickListener(v -> {
                      String old = prefs.getString("ai", "");
                      prefs.edit().putString("ai", old + "\n" + trainQ.getText() + "|||" + trainA.getText()).apply();
                      addLog("AI", "تم تدريب سؤال");
                      card("تم التدريب محليًا.");
                  });
              }

              private String localAi(String q) {
                  String all = "السلام عليكم|||وعليكم السلام ورحمة الله.\n" + prefs.getString("ai", "");
                  String nq = norm(q);
                  String best = "لم أتدرب على هذا السؤال بعد.";
                  int bestScore = -1;

                  for (String line: all.split("\\n")) {
                      String[] p = line.split("\\|\\|\\|");
                      if (p.length == 2) {
                          int sc = 0;
                          for (String w: norm(p[0]).split(" ")) {
                              if (nq.contains(w) && w.length() > 1) sc++;
                          }
                          if (sc > bestScore) {
                              bestScore = sc;
                              best = p[1];
                          }
                      }
                  }
                  return best;
              }

              private void showHealth() {
                  base("طبيب فرز ميداني");
                  back();

                  TextView warn = new TextView(this);
                  warn.setTextColor(Color.YELLOW);
                  warn.setText("تنبيه: فرز صحي فقط وليس تشخيصًا.");
                  root.addView(warn);

                  EditText symptoms = input("الأعراض");

                  btn("فرز الحالة").setOnClickListener(v -> {
                      String s = norm(symptoms.getText().toString());
                      String r = (s.contains("صدر") || s.contains("ضيق نفس") || s.contains("اغماء") || s.contains("نزيف"))
                              ? "طارئ: اذهب للطوارئ فورًا."
                              : "غير طارئ ظاهريًا: راقب الحالة وراجع طبيبًا إذا استمرت الأعراض.";
                      addLog("HEALTH", r);
                      card(r);
                  });
              }

              private void showPoet() {
                  base("الشاعر النبطي");
                  back();

                  EditText topic = input("الموضوع");

                  btn("اكتب بيتين").setOnClickListener(v -> {
                      String t = topic.getText().toString();
                      if (t.trim().isEmpty()) t = "الصحراء";

                      String poem = "يا راكبٍ من فوق موج الصحاري\n" +
                              "خذ من " + t + " معنى يشرّف مساري\n\n" +
                              "BOUH يشوف الأرض بعين البصيرة\n" +
                              "والذهب ما يطلع بغير اختباري";
                      addLog("POET", poem);
                      card(poem);
                  });
              }

              private void showLogs() {
                  base("السجل");
                  back();

                  EditText note = input("ملاحظة ميدانية");

                  btn("حفظ").setOnClickListener(v -> {
                      addLog("NOTE", note.getText().toString());
                      card("تم الحفظ");
                  });

                  btn("عرض السجل").setOnClickListener(v -> card(prefs.getString("logs", "لا يوجد سجل")));
              }

              private String exportReport() {
                  return "BOUH V68 REPORT\n" + new Date() +
                          "\nGPS=" + prefs.getString("last_gps", "-") +
                          "\n\nLOGS:\n" + prefs.getString("logs", "-");
              }

              private void addLog(String type, String msg) {
                  String t = new SimpleDateFormat("yyyy-MM-dd HH:mm:ss", Locale.US).format(new Date());
                  String old = prefs.getString("logs", "");
                  prefs.edit().putString("logs", old + "\n[" + t + "] " + type + ": " + msg).apply();
              }

              private double num(EditText e) {
                  try {
                      return Math.max(0, Math.min(100, Double.parseDouble(e.getText().toString().trim())));
                  } catch(Exception x) {
                      return 0;
                  }
              }

              private String norm(String s) {
                  return s.replace('أ','ا').replace('إ','ا').replace('آ','ا').replace('ة','ه').replace('ى','ي').toLowerCase(Locale.ROOT);
              }

              private String fmt(double v, int n) {
                  return String.format(Locale.US, "%." + n + "f", v).trim();
              }
          }
          JAVA

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Install Android SDK
        run: |
          set -e
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build APK
        run: gradle --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BOUH_V68_ONE_UPLOAD_debug_apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
