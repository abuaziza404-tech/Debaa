name: Build APK from ZIP بدون فك المشروع

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Repository root files:"
          ls -la
          echo ""
          echo "Workflow files:"
          find .github -maxdepth 3 -type f || true

      - name: Validate android-project.zip exists
        run: |
          if [ ! -f "android-project.zip" ]; then
            echo "ERROR: android-project.zip not found in repository root."
            echo "Please upload android-project.zip beside the .github folder."
            echo ""
            echo "Current files:"
            ls -la
            exit 1
          fi

      - name: Unzip Android project archive
        run: |
          rm -rf extracted-project
          mkdir -p extracted-project
          unzip -q android-project.zip -d extracted-project
          echo "Extracted files:"
          find extracted-project -maxdepth 3 -type f | head -100

      - name: Detect Android project root
        id: detect
        run: |
          PROJECT_DIR=""

          if [ -f "extracted-project/settings.gradle" ] || [ -f "extracted-project/settings.gradle.kts" ]; then
            PROJECT_DIR="extracted-project"
          else
            FOUND_DIR=$(find extracted-project -maxdepth 3 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -print -quit)
            if [ -n "$FOUND_DIR" ]; then
              PROJECT_DIR=$(dirname "$FOUND_DIR")
            fi
          fi

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Cannot find settings.gradle or settings.gradle.kts inside extracted project."
            find extracted-project -maxdepth 5 -type f | head -200
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Detected project dir: $PROJECT_DIR"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable if present
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          fi

      - name: Build debug APK
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew clean assembleDebug --stacktrace
          else
            gradle clean assembleDebug --stacktrace
          fi

      - name: Collect APK files
        run: |
          rm -rf apk-output
          mkdir -p apk-output
          find "${{ steps.detect.outputs.project_dir }}" -type f -name "*.apk" -exec cp {} apk-output/ \;
          echo "Collected APK files:"
          ls -la apk-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: A12-Recovery-Pro-APK
          path: apk-output/*.apk
          if-no-files-found: error
