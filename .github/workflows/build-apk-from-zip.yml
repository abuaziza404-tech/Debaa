name: Build APK from ZIP بدون فك المشروع

on:
  workflow_dispatch:
  push:
    paths:
      - "android-project.zip"
      - ".github/workflows/build-apk-from-zip.yml"

permissions:
  contents: read

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unzip Android project archive
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build-src
          mkdir -p build-src
          unzip -q android-project.zip -d build-src
          echo "Archive extracted into build-src"
          find build-src -maxdepth 3 -type f | sed 's#^# - #' | head -120

      - name: Detect Android project root
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$(find build-src -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) -printf '%h\n' | head -n 1)"

          if [ -z "${ROOT}" ]; then
            echo "No settings.gradle/settings.gradle.kts found."
            echo "Trying to detect project by build.gradle..."
            ROOT="$(find build-src -type f \( -name 'build.gradle' -o -name 'build.gradle.kts' \) -printf '%h\n' | head -n 1)"
          fi

          if [ -z "${ROOT}" ]; then
            echo "Could not detect Android/Gradle project root."
            find build-src -maxdepth 5 -type f | sort
            exit 1
          fi

          echo "project_root=${ROOT}" >> "$GITHUB_OUTPUT"
          echo "Detected project root: ${ROOT}"

      - name: Make Gradle wrapper executable if present
        shell: bash
        run: |
          ROOT="${{ steps.detect.outputs.project_root }}"
          if [ -f "$ROOT/gradlew" ]; then
            chmod +x "$ROOT/gradlew"
            echo "Gradle wrapper found."
          else
            echo "No Gradle wrapper found. System Gradle will be used."
          fi

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${{ steps.detect.outputs.project_root }}"
          cd "$ROOT"

          if [ -f "./gradlew" ]; then
            ./gradlew clean assembleDebug --stacktrace
          else
            gradle clean assembleDebug --stacktrace
          fi

      - name: Collect APK files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf apk-output
          mkdir -p apk-output

          find "${{ steps.detect.outputs.project_root }}" -type f -name "*.apk" -print -exec cp {} apk-output/ \;

          COUNT="$(find apk-output -type f -name '*.apk' | wc -l | tr -d ' ')"
          echo "APK count: $COUNT"

          if [ "$COUNT" = "0" ]; then
            echo "No APK files were produced."
            find "${{ steps.detect.outputs.project_root }}" -maxdepth 8 -type f | sort | tail -200
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: A12-Recovery-Pro-APK
          path: apk-output/*.apk
          if-no-files-found: error
